apiVersion: apps/v1
kind: Deployment

metadata:
  name: product-api
  namespace: product-catalog

spec:

  replicas: 2

  selector:
    matchLabels:
      app: product-api

  template:

    metadata:
      labels:
        app: product-api

    spec:

      containers:

      - name: product-api

        image: acrproductcatalogvijay.azurecr.io/product-api:v4

        imagePullPolicy: Always

        ports:
        - containerPort: 8000

        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 10
          periodSeconds: 5

        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 20
          periodSeconds: 10

        env:

        - name: DB_HOST
          valueFrom:
            configMapKeyRef:
              name: product-config
              key: DB_HOST

        - name: DB_PORT
          valueFrom:
            configMapKeyRef:
              name: product-config
              key: DB_PORT

        - name: DB_NAME
          valueFrom:
            configMapKeyRef:
              name: product-config
              key: DB_NAME

        - name: DB_USER
          valueFrom:
            secretKeyRef:
              name: product-secret
              key: DB_USER

        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: product-secret
              key: DB_PASSWORD