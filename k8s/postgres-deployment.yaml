apiVersion: apps/v1
kind: Deployment

metadata:
  name: postgres
  namespace: product-catalog

spec:
  replicas: 1

  selector:
    matchLabels:
      app: postgres

  template:

    metadata:
      labels:
        app: postgres

    spec:

      containers:

      - name: postgres

        image: postgres:16

        ports:
        - containerPort: 5432

        env:

        - name: POSTGRES_DB
          value: productdb

        - name: POSTGRES_USER
          valueFrom:
            secretKeyRef:
              name: product-secret
              key: DB_USER

        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: product-secret
              key: DB_PASSWORD
        - name: PGDATA
          value: /var/lib/postgresql/data/pgdata

        volumeMounts:
        - name: postgres-storage
          mountPath: /var/lib/postgresql/data

      volumes:

      - name: postgres-storage

        persistentVolumeClaim:
          claimName: postgres-pvc